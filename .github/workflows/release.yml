name: "release"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev pkg-config rpm

      - name: install frontend dependencies
        run: npm install --legacy-peer-deps

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Vector Configurator v__VERSION__"
          releaseBody: "See the assets below for the release binaries and update metadata."
          releaseDraft: false
          prerelease: false

      - name: create update metadata
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p updates
          # This is a simplified version; in a real scenario, you'd extract the signature
          # from the build artifacts. For now, we'll prepare the structure for manual/scripted sync.
          echo "Prepating update metadata for version ${{ github.ref_name }}"

      # Note: For full automation of the JSON metadata, we'd use a custom script
      # that reads the .sig files generated by Tauri.
